<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercise 8 - Box Model</title>

    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Local Community Event Portal</h1>

    <div class="eventCard">
        <h2>Music Festival</h2>
        <p>Enjoy music and entertainment with your community.</p>
    </div>

    <div class="eventCard">
        <h2>Sports Day</h2>
        <p>Participate in exciting sports activities.</p>
    </div>

    <h2>Registration Form</h2>

    <form>
        <input type="text" placeholder="Enter Name">
        <br><br>

        <input type="email" placeholder="Enter Email">
    </form>

    <h3>visibility: hidden Example</h3>
    <p class="hiddenBox">This text is hidden but space remains.</p>

    <h3>display: none Example</h3>
    <p class="noneBox">This text is completely removed.</p>

</body>
</html>
